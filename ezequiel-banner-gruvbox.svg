<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" width="900" height="200">
  <defs>
    <!-- Gruvbox background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d2021"/>
      <stop offset="100%" style="stop-color:#282828"/>
    </linearGradient>

    <!-- Gruvbox green/aqua glow -->
    <radialGradient id="glow1" cx="75%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#8EC07C;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8EC07C;stop-opacity:0"/>
    </radialGradient>

    <!-- Gruvbox bright red accent glow -->
    <radialGradient id="glow2" cx="20%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#FB4934;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#FB4934;stop-opacity:0"/>
    </radialGradient>

    <!-- Scanline pattern -->
    <pattern id="scanlines" width="900" height="3" patternUnits="userSpaceOnUse">
      <rect width="900" height="1" y="2" fill="rgba(255,255,255,0.015)"/>
    </pattern>

    <!-- Noise / grain filter -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow blur for lines -->
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Text glow filter -->
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="bounds">
      <rect width="900" height="200" rx="12"/>
    </clipPath>

    <linearGradient id="underlineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FB4934;stop-opacity:1"/>
      <stop offset="40%" style="stop-color:#8EC07C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#8EC07C;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8EC07C;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#8EC07C;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#FB4934;stop-opacity:0.6"/>
    </linearGradient>
  </defs>

  <g clip-path="url(#bounds)">
    <!-- Base background -->
    <rect width="900" height="200" fill="url(#bg)"/>

    <!-- Ambient glows -->
    <rect width="900" height="200" fill="url(#glow1)"/>
    <rect width="900" height="200" fill="url(#glow2)"/>

    <!-- Scanlines overlay -->
    <rect width="900" height="200" fill="url(#scanlines)"/>

    <!-- Grid lines - horizontal -->
    <line x1="0" y1="40" x2="900" y2="40" stroke="rgba(142,192,124,0.06)" stroke-width="1"/>
    <line x1="0" y1="80" x2="900" y2="80" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>
    <line x1="0" y1="120" x2="900" y2="120" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>
    <line x1="0" y1="160" x2="900" y2="160" stroke="rgba(142,192,124,0.06)" stroke-width="1"/>

    <!-- Grid lines - vertical -->
    <line x1="180" y1="0" x2="180" y2="200" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>
    <line x1="360" y1="0" x2="360" y2="200" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>
    <line x1="540" y1="0" x2="540" y2="200" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="200" stroke="rgba(142,192,124,0.04)" stroke-width="1"/>

    <!-- Accent diagonal lines left -->
    <line x1="-10" y1="200" x2="160" y2="0" stroke="rgba(142,192,124,0.08)" stroke-width="1" filter="url(#lineGlow)"/>
    <line x1="30" y1="200" x2="200" y2="0" stroke="rgba(142,192,124,0.05)" stroke-width="1"/>

    <!-- Accent vertical bar -->
    <rect x="58" y="30" width="2" height="140" fill="url(#accentBar)" rx="1"/>
    <line x1="59" y1="30" x2="59" y2="170" stroke="#8EC07C" stroke-width="2" stroke-opacity="0.6" filter="url(#lineGlow)"/>

    <!-- Top-right corner decoration -->
    <line x1="820" y1="20" x2="880" y2="20" stroke="#8EC07C" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="880" y1="20" x2="880" y2="60" stroke="#8EC07C" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Bottom-left corner decoration -->
    <line x1="20" y1="180" x2="80" y2="180" stroke="#FB4934" stroke-width="1" stroke-opacity="0.5"/>
    <line x1="20" y1="140" x2="20" y2="180" stroke="#FB4934" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Small dot matrix (top right area) -->
    <circle cx="790" cy="35" r="1.5" fill="#8EC07C" fill-opacity="0.4"/>
    <circle cx="806" cy="35" r="1.5" fill="#8EC07C" fill-opacity="0.3"/>
    <circle cx="822" cy="35" r="1.5" fill="#8EC07C" fill-opacity="0.2"/>
    <circle cx="790" cy="50" r="1.5" fill="#8EC07C" fill-opacity="0.3"/>
    <circle cx="806" cy="50" r="1.5" fill="#8EC07C" fill-opacity="0.25"/>
    <circle cx="822" cy="50" r="1.5" fill="#8EC07C" fill-opacity="0.15"/>

    <!-- Gruvbox red accent dots -->
    <circle cx="78" cy="170" r="3" fill="#FB4934" fill-opacity="0.7"/>
    <circle cx="68" cy="170" r="2" fill="#FB4934" fill-opacity="0.4"/>
    <circle cx="58" cy="170" r="1.5" fill="#FB4934" fill-opacity="0.25"/>

    <!-- Main name glow layer -->
    <text
      x="108"
      y="120"
      font-family="'Courier New', Courier, monospace"
      font-size="74"
      font-weight="700"
      letter-spacing="4"
      fill="#8EC07C"
      fill-opacity="0.12"
      filter="url(#textGlow)"
    >EZEQUIEL</text>

    <!-- Actual name text -->
    <text
      x="108"
      y="120"
      font-family="'Courier New', Courier, monospace"
      font-size="74"
      font-weight="700"
      letter-spacing="4"
      fill="#EBDBB2"
    >EZE<tspan fill="#8EC07C">QU</tspan><tspan fill="#EBDBB2">IEL</tspan></text>

    <!-- Underline accent -->
    <rect x="108" y="128" width="480" height="2" rx="1" fill="url(#underlineGrad)"/>

    <!-- Descriptor line -->
    <text
      x="112"
      y="158"
      font-family="'Courier New', Courier, monospace"
      font-size="13"
      letter-spacing="5"
      fill="#8EC07C"
      fill-opacity="0.75"
    >SOFTWARE DEVELOPER  ·  AI ENTHUSIAST</text>

    <!-- Small label top-left -->
    <text
      x="108"
      y="52"
      font-family="'Courier New', Courier, monospace"
      font-size="10"
      letter-spacing="3"
      fill="#FB4934"
      fill-opacity="0.8"
    >{ README.md }</text>

    <!-- Blinking cursor after name -->
    <rect x="608" y="78" width="3" height="44" rx="1" fill="#8EC07C" fill-opacity="0.8">
      <animate attributeName="fill-opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <!-- Subtle right-side circuit line decoration -->
    <polyline points="860,90 860,110 840,110 840,130 870,130 870,145" fill="none" stroke="#8EC07C" stroke-width="1" stroke-opacity="0.2"/>
    <circle cx="860" cy="90" r="2" fill="none" stroke="#8EC07C" stroke-opacity="0.3" stroke-width="1"/>
    <circle cx="870" cy="145" r="2" fill="#8EC07C" fill-opacity="0.3"/>
  </g>
</svg>
