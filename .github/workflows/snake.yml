name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Noro18
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00b4d8&color_dots=#060b14,#0d1f2d,#132f44,#1b4562,#02c39a&color_empty=#060b14
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00b4d8&color_dots=#060b14,#0d1f2d,#132f44,#1b4562,#02c39a&color_empty=#060b14
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}