name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Noro18
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ffeb3b&color_dots=#2d2d2d,#555555,#888888,#c0c0c0,#ffffff&color_empty=#161b22
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#ffeb3b&color_dots=#2d2d2d,#555555,#888888,#c0c0c0,#ffffff&color_empty=#161b22
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}