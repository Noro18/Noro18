name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Noro18
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=00F7FF&color_dots=#0a3d4a,#0d6b7a,#0f9aab,#00c8dc,#00F7FF&color_empty=#0d1117
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}