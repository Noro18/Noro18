name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Noro18
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#FB4934&color_dots=#1d2021,#3c3836,#504945,#665c54,#8EC07C&color_empty=#1d2021
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#FB4934&color_dots=#1d2021,#3c3836,#504945,#665c54,#8EC07C&color_empty=#1d2021
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}